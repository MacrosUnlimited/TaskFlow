<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Gestor de Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">TF</span>
        <span class="brand-name">TaskFlow</span>
      </div>

      <nav class="filters">
        <p class="nav-label">Vista</p>
        <button class="nav-item active" data-filter="all">
          <span class="nav-icon">◈</span> Todas
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-filter="pending">
          <span class="nav-icon">◇</span> Pendientes
          <span class="nav-count" id="count-pending">0</span>
        </button>
        <button class="nav-item" data-filter="done">
          <span class="nav-icon">◆</span> Completadas
          <span class="nav-count" id="count-done">0</span>
        </button>

        <p class="nav-label" style="margin-top: 2rem;">Categoría</p>
        <button class="nav-item" data-filter="trabajo">
          <span class="cat-dot dot-trabajo"></span> Trabajo
          <span class="nav-count" id="count-trabajo">0</span>
        </button>
        <button class="nav-item" data-filter="personal">
          <span class="cat-dot dot-personal"></span> Personal
          <span class="nav-count" id="count-personal">0</span>
        </button>
        <button class="nav-item" data-filter="urgente">
          <span class="cat-dot dot-urgente"></span> Urgente
          <span class="nav-count" id="count-urgente">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-ghost" id="btn-clear-done">Limpiar completadas</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- TOP BAR -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="page-title">Todas las tareas</h1>
          <span class="page-date" id="page-date"></span>
        </div>
        <div class="topbar-right">
          <button class="btn-pomodoro" id="btn-open-pomodoro">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Pomodoro
          </button>
        </div>
      </header>

      <!-- ADD TASK FORM -->
      <section class="add-task-section">
        <form class="add-task-form" id="add-task-form">
          <div class="input-group">
            <input type="text" id="task-input" placeholder="Nueva tarea..." autocomplete="off" maxlength="120"/>
            <select id="task-category">
              <option value="trabajo">Trabajo</option>
              <option value="personal">Personal</option>
              <option value="urgente">Urgente</option>
            </select>
            <button type="submit" class="btn-add">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </form>
      </section>

      <!-- TASK LIST -->
      <section class="task-list-section">
        <div class="task-list" id="task-list">
          <!-- tasks rendered here -->
        </div>
        <div class="empty-state" id="empty-state" style="display:none;">
          <div class="empty-icon">◈</div>
          <p>Sin tareas en esta vista.</p>
        </div>
      </section>

    </main>

  </div>

  <!-- POMODORO MODAL -->
  <div class="modal-overlay" id="pomodoro-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Pomodoro Timer</h2>
        <button class="modal-close" id="btn-close-pomodoro">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="pomodoro-mode-switcher">
        <button class="mode-btn active" data-mode="work">Foco — 25 min</button>
        <button class="mode-btn" data-mode="break">Descanso — 5 min</button>
      </div>

      <div class="pomodoro-display">
        <svg class="progress-ring" viewBox="0 0 200 200">
          <circle class="ring-track" cx="100" cy="100" r="85"/>
          <circle class="ring-fill" id="ring-fill" cx="100" cy="100" r="85"/>
        </svg>
        <div class="timer-overlay">
          <div class="timer-time" id="timer-display">25:00</div>
          <div class="timer-status" id="timer-status">Listo</div>
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="pomodoro-controls">
        <button class="ctrl-btn" id="btn-reset">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.51"/></svg>
        </button>
        <button class="ctrl-btn primary" id="btn-startstop">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-skip">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
      </div>

      <div class="session-count">
        <span class="session-label">Sesiones hoy</span>
        <div class="session-dots" id="session-dots"></div>
        <span class="session-num" id="session-num">0</span>
      </div>

    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-card modal-card--sm">
      <div class="modal-header">
        <h2 class="modal-title">Editar tarea</h2>
        <button class="modal-close" id="btn-close-edit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="edit-form">
        <input type="text" id="edit-input" placeholder="Editar tarea..." maxlength="120"/>
        <select id="edit-category">
          <option value="trabajo">Trabajo</option>
          <option value="personal">Personal</option>
          <option value="urgente">Urgente</option>
        </select>
        <button class="btn-save" id="btn-save-edit">Guardar cambios</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/pomodoro.js"></script>
</body>
</html>
